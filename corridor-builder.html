/* ===== Floor Plan Import ===== */

let floorplanDataURL = null;
let floorplanAspect = 1; // width/height ratio of the image

function fpCoords(cx, cy, halfW, halfH) {
  return [
    [cx - halfW,  cy + halfH], // top-left
    [cx + halfW,  cy + halfH], // top-right
    [cx + halfW,  cy - halfH], // bottom-right
    [cx - halfW,  cy - halfH], // bottom-left
  ];
}

function applyFloorplan() {
  if (!floorplanDataURL || !map.getSource) return;
  const scale   = parseFloat(document.getElementById('fpScale')?.value)   || 10;
  const cx      = parseFloat(document.getElementById('fpCX')?.value)      || 0;
  const cy      = parseFloat(document.getElementById('fpCY')?.value)      || 0;
  const opacity = parseFloat(document.getElementById('fpOpacity')?.value) ?? 0.35;

  const halfW = scale / 2;
  const halfH = (scale / floorplanAspect) / 2;
  const coords = fpCoords(cx, cy, halfW, halfH);

  if (map.getSource('floorplan-img')) {
    map.getSource('floorplan-img').updateImage({ url: floorplanDataURL, coordinates: coords });
    map.setPaintProperty('floorplan-layer', 'raster-opacity', opacity);
  } else {
    map.addSource('floorplan-img', { type: 'image', url: floorplanDataURL, coordinates: coords });
    map.addLayer({ id: 'floorplan-layer', type: 'raster', source: 'floorplan-img',
      paint: { 'raster-opacity': opacity } }, 'grid-lines');
  }
}

async function loadFloorplanFile(file) {
  const isPDF = file.name.toLowerCase().endsWith('.pdf');
  if (isPDF) {
    if (typeof pdfjsLib === 'undefined') { showToast('PDF.js not loaded yet, try again.'); return; }
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const totalPages = pdf.numPages;

    let pageNum = 1;
    if (totalPages > 1) {
      const input = window.prompt(`This PDF has ${totalPages} pages. Which page do you want to use? (1–${totalPages})`, document.getElementById('fpPage')?.value || '1');
      if (input === null) return; // cancelled
      pageNum = Math.min(Math.max(parseInt(input, 10) || 1, 1), totalPages);
      if (document.getElementById('fpPage')) document.getElementById('fpPage').value = pageNum;
    }

    const page = await pdf.getPage(pageNum);
    const vp = page.getViewport({ scale: 2 });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    floorplanDataURL = canvas.toDataURL('image/png');
    floorplanAspect = vp.width / vp.height;
  } else {
    await renderImage(file);
  }
  document.getElementById('floorplanControls').style.display = 'block';
  applyFloorplan();
  showToast('Floor plan loaded. Adjust scale and position.');
}

async function renderPDFPage(file, pageNum) {
  if (typeof pdfjsLib === 'undefined') { showToast('PDF.js not loaded yet, try again.'); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(Math.min(pageNum, pdf.numPages));
  const vp = page.getViewport({ scale: 2 });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  floorplanDataURL = canvas.toDataURL('image/png');
  floorplanAspect = vp.width / vp.height;
}

async function renderImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        floorplanAspect = img.width / img.height;
        floorplanDataURL = e.target.result;
        resolve();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function removeFloorplan() {
  floorplanDataURL = null;
  if (map.getLayer('floorplan-layer')) map.removeLayer('floorplan-layer');
  if (map.getSource('floorplan-img')) map.removeSource('floorplan-img');
  document.getElementById('floorplanControls').style.display = 'none';
  document.getElementById('floorplanFile').value = '';
  showToast('Floor plan removed.');
}

document.getElementById('floorplanFile')?.addEventListener('change', async e => {
  const f = e.target.files[0];
  if (f) await loadFloorplanFile(f);
  e.target.value = '';
});

['fpScale', 'fpCX', 'fpCY'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', () => { if (floorplanDataURL) applyFloorplan(); });
});

document.getElementById('fpOpacity')?.addEventListener('input', () => {
  if (!floorplanDataURL) return;
  const opacity = parseFloat(document.getElementById('fpOpacity').value);
  if (map.getLayer('floorplan-layer')) map.setPaintProperty('floorplan-layer', 'raster-opacity', opacity);
});

document.getElementById('fpRemove')?.addEventListener('click', removeFloorplan);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
    e.preventDefault();
    undo();
    return;
  }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedNodeIds.size > 1) { deleteSelected(); return; }
    if (selectedNodeId) { deleteNode(selectedNodeId); return; }
  }

  if (e.key === 'Escape' && corridorStart) {
    corridorStart = null;
    map.getSource('preview')?.setData(emptyFC());
    map.getSource('snap')?.setData(emptyFC());
    updateHint('Click to start a new corridor.');
    showToast('Corridor cancelled.');
  }
});
</script>
</body>
</html>
